version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: huntlink-postgres
    restart: always
    environment:
      POSTGRES_DB: huntlink
      POSTGRES_USER: huntlink
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-huntlink_user_password_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - huntlink-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huntlink"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: huntlink-backend
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: huntlink
      DB_PASSWORD: ${POSTGRES_PASSWORD:-huntlink_user_password_2026}
      DB_DATABASE: huntlink
      JWT_SECRET: ${JWT_SECRET:-huntlink-jwt-secret-key-2026-change-in-production}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - huntlink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: huntlink-frontend
    restart: always
    environment:
      VITE_API_BASE_URL: http://150.158.51.199:3000/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - huntlink-network

  redis:
    image: redis:7-alpine
    container_name: huntlink-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - huntlink-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

networks:
  huntlink-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
